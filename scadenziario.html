<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scadenziario</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0e0e;--surface:#181818;--surface2:#202020;--border:#2c2c2c;
    --text:#efefef;--muted:#606060;--accent:#f0c040;
    --ok:#3ecf6e;--warn:#f08030;--danger:#e03050;--info:#4090e0;
    --radius:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;min-height:100vh;}

  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo h1{font-weight:800;font-size:1.6rem;letter-spacing:3px;text-transform:uppercase;}
  .logo h1 span{color:var(--accent);}
  .date-now{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--muted);letter-spacing:1px;}

  main{max-width:980px;margin:0 auto;padding:28px 18px;}

  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px;}
  .scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;border-left:4px solid var(--border);}
  .scard.danger{border-left-color:var(--danger);}
  .scard.warn{border-left-color:var(--warn);}
  .scard.ok{border-left-color:var(--ok);}
  .scard.info{border-left-color:var(--info);}
  .scard .num{font-family:'Space Mono',monospace;font-size:2.2rem;font-weight:700;line-height:1;}
  .scard.danger .num{color:var(--danger);}
  .scard.warn .num{color:var(--warn);}
  .scard.ok .num{color:var(--ok);}
  .scard.info .num{color:var(--info);}
  .scard .slabel{font-size:0.78rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px;}

  .section-title{font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

  .vehicle{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;transition:border-color 0.2s;}
  .vehicle:hover{border-color:#3a3a3a;}
  .vehicle-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface2);cursor:pointer;user-select:none;}
  .vehicle-left{display:flex;align-items:center;gap:14px;}
  .v-icon{font-size:1.4rem;}
  .v-name{font-size:1.2rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
  .v-plate{font-family:'Space Mono',monospace;font-size:0.72rem;letter-spacing:2px;background:var(--border);color:var(--muted);padding:2px 8px;border-radius:4px;}
  .v-right{display:flex;align-items:center;gap:10px;}
  .v-dot{width:10px;height:10px;border-radius:50%;background:var(--ok);}
  .v-dot.warn{background:var(--warn);}
  .v-dot.danger{background:var(--danger);animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .v-chevron{font-size:0.9rem;color:var(--muted);transition:transform 0.2s;}
  .vehicle.open .v-chevron{transform:rotate(180deg);}
  .deadlines{display:none;padding:14px 20px 18px;}
  .vehicle.open .deadlines{display:block;}
  .dl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;}
  .dl-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;border-left:3px solid var(--border);}
  .dl-item.ok{border-left-color:var(--ok);}
  .dl-item.warn{border-left-color:var(--warn);}
  .dl-item.danger{border-left-color:var(--danger);}
  .dl-type{font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .dl-date{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;}
  .dl-countdown{font-size:0.82rem;margin-top:4px;}
  .dl-item.ok .dl-countdown{color:var(--ok);}
  .dl-item.warn .dl-countdown{color:var(--warn);}
  .dl-item.danger .dl-countdown{color:var(--danger);}

  .alerts-panel{margin-bottom:28px;}
  .alert-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:var(--radius);margin-bottom:8px;font-size:0.95rem;font-weight:600;letter-spacing:0.3px;}
  .alert-row.danger{background:rgba(224,48,80,0.10);border:1px solid rgba(224,48,80,0.28);color:#ff8090;}
  .alert-row.warn{background:rgba(240,128,48,0.09);border:1px solid rgba(240,128,48,0.28);color:#ffaa60;}
  .alert-icon{font-size:1rem;flex-shrink:0;}
  .alert-text{flex:1;}
  .alert-days{font-family:'Space Mono',monospace;font-size:0.75rem;opacity:0.8;white-space:nowrap;}

  @media(max-width:600px){
    .summary{grid-template-columns:repeat(2,1fr);}
    .dl-grid{grid-template-columns:1fr 1fr;}
    header{padding:12px 14px;}
    main{padding:16px 10px;}
    .v-name{font-size:1rem;}
  }
</style>
</head>
<body>

<header>
  <div class="logo"><h1>🚗 Scaden<span>ziario</span></h1></div>
  <div class="date-now" id="dateNow"></div>
</header>

<main>
  <div class="summary">
    <div class="scard danger"><div class="num" id="s-danger">0</div><div class="slabel">Scadute / Urgenti</div></div>
    <div class="scard warn"><div class="num" id="s-warn">0</div><div class="slabel">Entro 30 giorni</div></div>
    <div class="scard info"><div class="num" id="s-soon">0</div><div class="slabel">Entro 90 giorni</div></div>
    <div class="scard ok"><div class="num" id="s-ok">0</div><div class="slabel">In regola</div></div>
  </div>

  <div class="section-title">Avvisi</div>
  <div class="alerts-panel" id="alertsPanel"></div>

  <div class="section-title">I tuoi mezzi — clicca per espandere</div>
  <div id="vehicleList"></div>

  <div class="section-title" style="margin-top:28px;">Documenti personali</div>
  <div id="docList"></div>
</main>

<script>
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

const VEHICLES = [
  {name:"Honda SH 300",plate:"CY41548",icon:"🛵",deadlines:[
    {type:"Bollo",date:"2026-07-31"},
    {type:"Assicurazione",date:"2027-01-16"},
    {type:"Revisione",date:"2027-03-31"}
  ]},
  {name:"Honda SH 125",plate:"EJ59833",icon:"🛵",deadlines:[
    {type:"Bollo",date:"2027-01-31"},
    {type:"Assicurazione",date:"2026-05-28"},
    {type:"Revisione",date:"2027-07-31"}
  ]},
  {name:"Kawasaki Z600",plate:"DE85592",icon:"🏍️",deadlines:[
    {type:"Bollo",date:"2026-07-31"},
    {type:"Assicurazione",date:"2026-06-26"},
    {type:"Revisione",date:"2026-06-30"}
  ]},
  {name:"Mercedes",plate:"DE269RY",icon:"🚗",deadlines:[
    {type:"Bollo",date:"2026-11-30"},
    {type:"Assicurazione",date:"2026-06-13"},
    {type:"Revisione",date:"2027-11-30"}
  ]},
  {name:"Fiat Punto 100hp",plate:"DH309GE",icon:"🚙",deadlines:[
    {type:"Bollo",date:"2026-04-30"},
    {type:"Assicurazione",date:"2026-12-01"},
    {type:"Revisione",date:"2028-03-01"}
  ]},
  {name:"Fiat Punto Feel",plate:"CB673HW",icon:"🚙",deadlines:[
    {type:"Bollo",date:"2026-12-31"},
    {type:"Assicurazione",date:"2026-06-16"},
    {type:"Revisione",date:"2027-03-31"}
  ]}
];

const DOCUMENTS = [
  {name:"Patente di Guida",number:"IM 5212339K",icon:"🪪",deadlines:[
    {type:"Scadenza",date:"2028-11-14"}
  ]},
  {name:"Carta d'Identità",number:"CA 91288QU",icon:"🪪",deadlines:[
    {type:"Scadenza",date:"2033-11-14"}
  ]},
  {name:"Passaporto",number:"YB6571179",icon:"📘",deadlines:[
    {type:"Scadenza",date:"2030-08-30"}
  ]}
];

function daysDiff(dateStr){
  const d=new Date(dateStr);d.setHours(0,0,0,0);
  return Math.round((d-TODAY)/86400000);
}
function getStatus(days){
  if(days<=30)return"danger";
  if(days<=90)return"warn";
  return"ok";
}
function countdownLabel(days){
  if(days<0)return`Scaduta da ${Math.abs(days)} giorni`;
  if(days===0)return"Scade oggi!";
  return`${days} giorni rimasti`;
}
function fmtDate(s){
  const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;
}
function worstStatus(deadlines){
  let w="ok";
  for(const dl of deadlines){
    const s=getStatus(daysDiff(dl.date));
    if(s==="danger")return"danger";
    if(s==="warn")w="warn";
  }
  return w;
}

document.getElementById("dateNow").textContent=
  TODAY.toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}).toUpperCase();

let cD=0,cW=0,cS=0,cO=0;
const alerts=[];

function countItems(items, labelFn) {
  items.forEach(v=>{
    v.deadlines.forEach(dl=>{
      const days=daysDiff(dl.date),st=getStatus(days);
      if(st==="danger"){cD++;alerts.push({status:"danger",text:labelFn(v,dl),days});}
      else if(st==="warn"){cW++;alerts.push({status:"warn",text:labelFn(v,dl),days});}
      else if(days<=90){cS++;}
      else{cO++;}
    });
  });
}

countItems(VEHICLES,(v,dl)=>`${v.name} (${v.plate}) — ${dl.type}`);
countItems(DOCUMENTS,(d,dl)=>`${d.name} (${d.number}) — ${dl.type}`);

document.getElementById("s-danger").textContent=cD;
document.getElementById("s-warn").textContent=cW;
document.getElementById("s-soon").textContent=cS;
document.getElementById("s-ok").textContent=cO;

alerts.sort((a,b)=>a.days-b.days);
const ap=document.getElementById("alertsPanel");
if(alerts.length===0){
  ap.innerHTML=`<div class="alert-row" style="background:rgba(62,207,110,0.08);border:1px solid rgba(62,207,110,0.2);color:#3ecf6e;">
    <span class="alert-icon">✅</span><span class="alert-text">Tutto in regola — nessuna scadenza imminente!</span></div>`;
}else{
  ap.innerHTML=alerts.map(a=>`
    <div class="alert-row ${a.status}">
      <span class="alert-icon">${a.status==="danger"?"🔴":"🟡"}</span>
      <span class="alert-text">${a.text}</span>
      <span class="alert-days">${countdownLabel(a.days)}</span>
    </div>`).join("");
}

function renderCards(items, container, labelKey) {
  items.forEach(v=>{
    const ws=worstStatus(v.deadlines);
    const dotCls=ws==="danger"?"danger":ws==="warn"?"warn":"";
    const sub = v[labelKey];
    const dlHtml=v.deadlines.map(dl=>{
      const days=daysDiff(dl.date),st=getStatus(days);
      return`<div class="dl-item ${st}">
        <div class="dl-type">${dl.type}</div>
        <div class="dl-date">${fmtDate(dl.date)}</div>
        <div class="dl-countdown">${countdownLabel(days)}</div>
      </div>`;
    }).join("");
    const card=document.createElement("div");
    card.className="vehicle";
    card.innerHTML=`
      <div class="vehicle-header">
        <div class="vehicle-left">
          <span class="v-icon">${v.icon}</span>
          <span class="v-name">${v.name}</span>
          <span class="v-plate">${sub}</span>
        </div>
        <div class="v-right">
          <span class="v-dot ${dotCls}"></span>
          <span class="v-chevron">▼</span>
        </div>
      </div>
      <div class="deadlines"><div class="dl-grid">${dlHtml}</div></div>`;
    card.querySelector(".vehicle-header").addEventListener("click",()=>card.classList.toggle("open"));
    if(ws==="danger"||ws==="warn")card.classList.add("open");
    container.appendChild(card);
  });
}

renderCards(VEHICLES, document.getElementById("vehicleList"), "plate");
renderCards(DOCUMENTS, document.getElementById("docList"), "number");
</script>
</body>
</html>
